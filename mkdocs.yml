# Project information
site_name: Liam's Blog
site_author: lnw143
site_url: https://lnw143.github.io/blog/

# Repository
repo_name: 'blog'
repo_url: 'https://github.com/lnw143/blog'
edit_uri: 'edit/main/docs/'

# Theme Settings
theme:
  name: material
  language: 'zh'
  custom_dir: overrides
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: red
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: white
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  favicon: 'favicon.svg'
  icon:
    logo: 'material/omega'
  font:
    text: 'Fira Sans'
    code: 'Fira Mono'
  features:
    - content.code.annotate
    - content.code.select
    - content.action.view
    - content.code.copy
    - navigation.tabs
    - navigation.instant
    - navigation.indexes

# Contents
nav:
  - 主页:
    - index.md
  - Geometry:
    - posts/algo/geometry/index.md
  - Poly:
    - posts/algo/poly/index.md
  - Number Theory:
    - posts/algo/number-theory/index.md
  - Math:
    - posts/algo/math/index.md
  - String:
    - posts/algo/string/index.md
  - Codeforces:
    - posts/tutorial/CF/index.md
  - GMOJ:
    - posts/tutorial/GMOJ/index.md
  - Record:
    - posts/record/index.md
  - Misc:
    - posts/misc/index.md
  # - AtCoder:
  #   - blog/posts/AtCoder/index.md

# Plugins
plugins:
  - search
  - blog:
      blog_dir: "./"
      post_url_format: "{categories}/{file}"
      post_date_format: medium
      post_url_max_categories: 1
      blog_toc: true
      # post_dir: "{blog}/"

# Extensions
markdown_extensions:
  - admonition
  - def_list
  - footnotes
  - meta
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
      # emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - toc:
      permalink: ""
      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js
  - https://unpkg.com/jquery@3.4.1/dist/jquery.js
  - https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.js
  - https://cdn.jsdelivr.net/npm/meting@2.0.1/dist/Meting.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css
  - stylesheets/extra.css
  - https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.css